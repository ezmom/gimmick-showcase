<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><title>ベクターアニメ比較</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Kaku Gothic ProN',sans-serif;background:#0a0a14;color:#fff;padding:20px}
h1{text-align:center;font-size:18px;margin-bottom:6px}
p.sub{text-align:center;color:#666;font-size:11px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:1200px;margin:0 auto}
.card{border:1px solid rgba(255,255,255,0.08);border-radius:10px;overflow:hidden}
.card h3{padding:8px 12px;font-size:12px;background:rgba(255,255,255,0.03);color:#aaa}
.card .desc{padding:4px 12px 8px;font-size:10px;color:#666}
.card iframe{width:100%;height:350px;border:none;background:#fff;display:block}
.card .tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;margin-left:4px}
.tag.free{background:rgba(34,197,94,0.15);color:#22c55e}
.tag.ctrl{background:rgba(79,195,247,0.15);color:#4fc3f7}
</style></head><body>
<h1>🎯 ベクターアートアニメーション比較 — 毛穴引き締め</h1>
<p class="sub">全方式コスト¥0 / ベクターだから解像度無限 / 毛穴が本当に引き締まる</p>
<div class="grid">
  <div class="card">
    <h3>S1: SVG + CSS Animation <span class="tag free">¥0</span><span class="tag ctrl">精密制御</span></h3>
    <div class="desc">SVGパスをCSSキーフレームで変形。壁が内側に動き、皮脂が縮む</div>
    <iframe src="s1_svg_css.html"></iframe>
  </div>
  <div class="card">
    <h3>S2: SVG SMIL Animation <span class="tag free">¥0</span><span class="tag ctrl">精密制御</span></h3>
    <div class="desc">SVG内蔵のanimate要素。JSもCSSも不要。パス変形+イージング</div>
    <iframe src="s2_svg_smil.html"></iframe>
  </div>
  <div class="card">
    <h3>S5: Canvas 2D <span class="tag free">¥0</span><span class="tag ctrl">最高精密</span></h3>
    <div class="desc">JSでフレーム毎に描画。60fps。ベジェ曲線で壁が滑らかに収縮</div>
    <iframe src="s5_canvas.html"></iframe>
  </div>
</div>
</body></html>
