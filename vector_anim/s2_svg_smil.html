<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>S2: SVG SMIL Animation</title>
<style>*{margin:0;padding:0}body{background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}svg{width:480px;height:480px}</style>
</head><body>
<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ec8e3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7ec8e3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="480" height="125" fill="#d4eaf7"/>
  <rect y="115" width="480" height="12" fill="#a8d4f0"/>

  <!-- Dermis -->
  <rect y="125" width="480" height="175" fill="#f5c4a8"/>
  <rect y="290" width="480" height="190" fill="#e8a080"/>

  <!-- Pore canal — SMIL animate for d attribute -->
  <path fill="#fff" opacity="0.97">
    <animate attributeName="d" dur="4s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.2 1;0.1 0 0.1 1;0.4 0 0.2 1"
      keyTimes="0;0.4;0.65;1"
      values="
        M 175,125 C 172,180 158,260 162,330 C 165,370 175,400 195,410 L 285,410 C 305,400 315,370 318,330 C 322,260 308,180 305,125 Z;
        M 205,125 C 205,180 205,260 210,330 C 212,370 215,400 225,410 L 255,410 C 265,400 268,370 270,330 C 275,260 275,180 275,125 Z;
        M 205,125 C 205,180 205,260 210,330 C 212,370 215,400 225,410 L 255,410 C 265,400 268,370 270,330 C 275,260 275,180 275,125 Z;
        M 175,125 C 172,180 158,260 162,330 C 165,370 175,400 195,410 L 285,410 C 305,400 315,370 318,330 C 322,260 308,180 305,125 Z"/>
  </path>

  <!-- Opening curve -->
  <path fill="#d4eaf7">
    <animate attributeName="d" dur="4s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.2 1;0.1 0 0.1 1;0.4 0 0.2 1"
      keyTimes="0;0.4;0.65;1"
      values="
        M 165,127 Q 240,100 315,127 L 315,125 L 165,125 Z;
        M 200,127 Q 240,115 280,127 L 280,125 L 200,125 Z;
        M 200,127 Q 240,115 280,127 L 280,125 L 200,125 Z;
        M 165,127 Q 240,100 315,127 L 315,125 L 165,125 Z"/>
  </path>

  <!-- Sebum -->
  <ellipse cx="240" cy="380" fill="#f0d060">
    <animate attributeName="rx" dur="4s" repeatCount="indefinite" values="28;10;10;28" keyTimes="0;0.4;0.65;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.1 0 0.1 1;0.4 0 0.2 1"/>
    <animate attributeName="ry" dur="4s" repeatCount="indefinite" values="20;7;7;20" keyTimes="0;0.4;0.65;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.1 0 0.1 1;0.4 0 0.2 1"/>
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0.9;0.35;0.35;0.9" keyTimes="0;0.4;0.65;1"/>
  </ellipse>

  <!-- Particles -->
  <circle cx="232" r="4.5" fill="#7ec8e3">
    <animate attributeName="cy" dur="4s" begin="0.5s" repeatCount="indefinite" values="110;360;360;110" keyTimes="0;0.45;0.5;1"/>
    <animate attributeName="opacity" dur="4s" begin="0.5s" repeatCount="indefinite" values="0;0.9;0;0" keyTimes="0;0.05;0.5;1"/>
  </circle>
  <circle cx="248" r="4" fill="#7ec8e3">
    <animate attributeName="cy" dur="4s" begin="0.9s" repeatCount="indefinite" values="110;350;350;110" keyTimes="0;0.45;0.5;1"/>
    <animate attributeName="opacity" dur="4s" begin="0.9s" repeatCount="indefinite" values="0;0.85;0;0" keyTimes="0;0.05;0.5;1"/>
  </circle>
  <circle cx="240" r="5" fill="#7ec8e3">
    <animate attributeName="cy" dur="4s" begin="1.3s" repeatCount="indefinite" values="110;370;370;110" keyTimes="0;0.45;0.5;1"/>
    <animate attributeName="opacity" dur="4s" begin="1.3s" repeatCount="indefinite" values="0;0.9;0;0" keyTimes="0;0.05;0.5;1"/>
  </circle>

  <!-- Sparkle at completion -->
  <circle cx="240" cy="115" fill="#fff">
    <animate attributeName="r" dur="4s" repeatCount="indefinite" values="0;0;0;14;5;0;0" keyTimes="0;0.38;0.42;0.48;0.55;0.6;1"/>
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0;0;0;0.9;0.6;0;0" keyTimes="0;0.38;0.42;0.48;0.55;0.6;1"/>
  </circle>
</svg>
</body></html>
