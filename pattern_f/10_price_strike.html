<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
.wrap{position:relative;width:570px;height:280px}
.wrap img{width:100%;height:100%;object-fit:contain;display:block}

/* 打ち消し線アニメーション — 元の価格にラインを引く */
.strike-line{position:absolute;top:40%;left:10%;width:0;height:4px;background:linear-gradient(90deg,#e74c6f,#ff1744);border-radius:2px;animation:strikeThrough 2s ease-out 0.5s forwards;transform:rotate(-3deg)}
@keyframes strikeThrough{
  0%{width:0;opacity:0}
  20%{opacity:1}
  100%{width:35%;opacity:1}
}

/* 特別価格のパルス光 */
.price-glow{position:absolute;top:30%;right:12%;width:180px;height:100px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,215,0,0.25),transparent);animation:priceGlow 2s ease-in-out 1.5s infinite;pointer-events:none}
@keyframes priceGlow{
  0%,100%{opacity:0.3;transform:scale(1)}
  50%{opacity:0.7;transform:scale(1.15)}
}

/* OFFバッジの弾けアニメ */
.badge-pop{position:absolute;top:15%;right:8%;width:60px;height:60px;opacity:0;animation:badgePop 0.6s cubic-bezier(0.68,-0.55,0.27,1.55) 2s forwards}
@keyframes badgePop{
  0%{opacity:0;transform:scale(0) rotate(-20deg)}
  100%{opacity:1;transform:scale(1) rotate(0deg)}
}

/* スパークル */
.sparkle{position:absolute;width:12px;height:12px;opacity:0;pointer-events:none}
.s1{top:20%;right:20%;animation:sparkle 1.5s ease-in-out 2.5s infinite}
.s2{top:50%;right:5%;animation:sparkle 1.5s ease-in-out 3s infinite}
.s3{bottom:20%;right:25%;animation:sparkle 1.5s ease-in-out 3.5s infinite}
@keyframes sparkle{
  0%,100%{opacity:0;transform:scale(0) rotate(0deg)}
  50%{opacity:1;transform:scale(1) rotate(180deg)}
}
</style></head>
<body>
<div class="wrap">
  <img src="../pattern_b/10_price_strike.png" alt="価格打ち消し">

  <!-- 打ち消し線アニメ -->
  <div class="strike-line"></div>

  <!-- 特別価格グロー -->
  <div class="price-glow"></div>

  <!-- スパークル -->
  <div class="sparkle s1"><svg viewBox="0 0 12 12"><polygon points="6,0 7,4 12,4 8,7 9,12 6,9 3,12 4,7 0,4 5,4" fill="#FFD700"/></svg></div>
  <div class="sparkle s2"><svg viewBox="0 0 12 12"><polygon points="6,0 7,4 12,4 8,7 9,12 6,9 3,12 4,7 0,4 5,4" fill="#FFD700"/></svg></div>
  <div class="sparkle s3"><svg viewBox="0 0 12 12"><polygon points="6,0 7,4 12,4 8,7 9,12 6,9 3,12 4,7 0,4 5,4" fill="#FFD700"/></svg></div>
</div>
</body></html>
