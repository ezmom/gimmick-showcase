<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
.wrap{position:relative;width:570px;height:355px}
.wrap img{width:100%;height:100%;object-fit:contain;display:block}

/* 浸透パーティクル — 右パネル(美容液X)のエリアに浸透粒子を落とす */
.particle{position:absolute;width:8px;height:8px;border-radius:50%;background:radial-gradient(circle,rgba(231,76,111,0.9),rgba(231,76,111,0.3));opacity:0;pointer-events:none}

.p1{right:28%;animation:penetrate 3s ease-in 0s infinite}
.p2{right:22%;animation:penetrate 3s ease-in 0.5s infinite}
.p3{right:32%;animation:penetrate 3s ease-in 1s infinite}
.p4{right:25%;animation:penetrate 3s ease-in 1.5s infinite}
.p5{right:35%;animation:penetrate 3s ease-in 2s infinite}

@keyframes penetrate{
  0%{top:20%;opacity:0;transform:scale(1)}
  15%{opacity:0.9;transform:scale(1.2)}
  80%{top:75%;opacity:0.6;transform:scale(0.6)}
  100%{top:85%;opacity:0;transform:scale(0.3)}
}

/* 左パネルにバツ印パルス（通常化粧品=浸透しない） */
.block-mark{position:absolute;top:42%;left:18%;width:30px;height:30px;opacity:0;animation:blockPulse 3s ease-in-out 1s infinite}
@keyframes blockPulse{
  0%,100%{opacity:0;transform:scale(0.8)}
  50%{opacity:0.7;transform:scale(1.1)}
}

/* 光沢 */
.shine{position:absolute;top:0;left:-80%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);animation:shine 5s ease-in-out 1.5s infinite;pointer-events:none}
@keyframes shine{0%{left:-80%}40%{left:130%}100%{left:130%}}
</style></head>
<body>
<div class="wrap">
  <img src="../pattern_b/02_penetration.png" alt="浸透比較">

  <!-- 浸透パーティクル（右パネル） -->
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>

  <!-- ブロックマーク（左パネル） -->
  <div class="block-mark">
    <svg viewBox="0 0 30 30" fill="none"><line x1="5" y1="5" x2="25" y2="25" stroke="#999" stroke-width="3" stroke-linecap="round"/><line x1="25" y1="5" x2="5" y2="25" stroke="#999" stroke-width="3" stroke-linecap="round"/></svg>
  </div>

  <div class="shine"></div>
</div>
</body></html>
