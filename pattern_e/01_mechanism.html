<!-- E-01: ハイブリッド（Gemini画像 + CSSアニメーション） -->
<div style="width:570px;height:355px;position:relative;overflow:hidden;border-radius:12px;background:#fff;margin:0 auto;">
  <!-- Gemini生成画像をベースに使用 -->
  <img src="../pattern_b/01_mechanism.png" style="width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;">
  <!-- CSSアニメオーバーレイ: 浸透粒子 -->
  <svg viewBox="0 0 570 355" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
    <!-- 左側の浸透粒子アニメーション -->
    <circle cx="140" r="6" fill="#4fc3f7" opacity="0.7">
      <animate attributeName="cy" values="80;280;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" r="5" fill="#4fc3f7" opacity="0.6">
      <animate attributeName="cy" values="80;280;80" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" r="6" fill="#4fc3f7" opacity="0.7">
      <animate attributeName="cy" values="80;280;80" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <!-- 右側の×マークパルス -->
    <text x="430" y="230" text-anchor="middle" fill="#e53935" font-size="48" font-weight="bold" opacity="0.7">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="font-size" values="40;52;40" dur="2s" repeatCount="indefinite"/>
    </text>
    <!-- グロー効果 -->
    <circle cx="180" r="30" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.3">
      <animate attributeName="cy" values="80;280;80" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="15;35;15" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </svg>
</div>
