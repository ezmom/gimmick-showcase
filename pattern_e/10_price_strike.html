<!-- E-10_price_strike: Hybrid (Gemini image + CSS animation) -->

      <animate attributeName="x2" values="160;410;410" dur="2s" repeatCount="indefinite"/>

    <text x="285" y="260" text-anchor="middle" fill="#e53935" font-size="36" font-weight="bold" opacity="0">
      ¥3,980
      <animate attributeName="opacity" values="0;0;1;1" dur="2s" repeatCount="indefinite"/>

    </text>
  </svg>
