<!-- E-14_reviews_carousel: Hybrid (Gemini image + CSS animation) -->
<div style="width:570px;height:355px;position:relative;overflow:hidden;border-radius:12px;background:#fff;margin:0 auto;">
  <img src="../pattern_b/14_reviews_carousel.png" style="width:100%;height:100%;object-fit:contain;position:absolute;inset:0;">
  <svg viewBox="0 0 570 355" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
    <style>@keyframes starTwinkle{0%,100%{opacity:0.3;fill:#ffd700}50%{opacity:1;fill:#ffeb3b}}</style>
    <text x="80" y="115" font-size="14" style="animation:starTwinkle 1.5s 0s infinite;">★★★★★</text>
    <text x="230" y="115" font-size="14" style="animation:starTwinkle 1.5s 0.5s infinite;">★★★★★</text>
    <text x="380" y="115" font-size="14" style="animation:starTwinkle 1.5s 1s infinite;">★★★★★</text>
  </svg>
</div>
