<!-- E-20_free_shipping: Hybrid (Gemini image + CSS animation) -->
<div style="width:570px;height:355px;position:relative;overflow:hidden;border-radius:12px;background:#fff;margin:0 auto;">
  <img src="../pattern_b/20_free_shipping.png" style="width:100%;height:100%;object-fit:contain;position:absolute;inset:0;">
  <svg viewBox="0 0 570 355" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
    <style>@keyframes gift{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}</style>
    <style>@keyframes sp5{0%,100%{r:0;opacity:0}50%{r:5;opacity:0.8}}</style>
    <circle cx="100" cy="60" fill="#ffd700" style="animation:sp5 2s 0s infinite;"/>
    <circle cx="470" cy="70" fill="#e74c6f" style="animation:sp5 2s 0.3s infinite;"/>
    <circle cx="80" cy="290" fill="#4fc3f7" style="animation:sp5 2s 0.6s infinite;"/>
    <circle cx="490" cy="280" fill="#66bb6a" style="animation:sp5 2s 0.9s infinite;"/>
    <circle cx="285" cy="40" fill="#ffa726" style="animation:sp5 2s 1.2s infinite;"/>
    <circle cx="285" cy="320" fill="#ab47bc" style="animation:sp5 2s 1.5s infinite;"/>
  </svg>
</div>
