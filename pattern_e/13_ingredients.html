<!-- E-13_ingredients: Hybrid (Gemini image + CSS animation) -->
<div style="width:570px;height:355px;position:relative;overflow:hidden;border-radius:12px;background:#fff;margin:0 auto;">
  <img src="../pattern_b/13_ingredients.png" style="width:100%;height:100%;object-fit:contain;position:absolute;inset:0;">
  <svg viewBox="0 0 570 355" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
    <style>@keyframes pulse{0%,100%{r:3;opacity:0}50%{r:8;opacity:0.6}}</style>
    <circle cx="285" cy="175" r="50" fill="none" stroke="rgba(231,76,111,0.3)" stroke-width="2"><animate attributeName="r" values="50;80;50" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="100" fill="#4fc3f7" style="animation:pulse 2s 0s infinite;"/>
    <circle cx="420" cy="100" fill="#66bb6a" style="animation:pulse 2s 0.4s infinite;"/>
    <circle cx="120" cy="250" fill="#ffa726" style="animation:pulse 2s 0.8s infinite;"/>
    <circle cx="450" cy="250" fill="#ab47bc" style="animation:pulse 2s 1.2s infinite;"/>
    <circle cx="285" cy="60" fill="#e74c6f" style="animation:pulse 2s 1.6s infinite;"/>
  </svg>
</div>
