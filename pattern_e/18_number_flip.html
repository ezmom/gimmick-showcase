<!-- E-18_number_flip: Hybrid (Gemini image + CSS animation) -->
<div style="width:570px;height:355px;position:relative;overflow:hidden;border-radius:12px;background:#fff;margin:0 auto;">
  <img src="../pattern_b/18_number_flip.png" style="width:100%;height:100%;object-fit:contain;position:absolute;inset:0;">
  <svg viewBox="0 0 570 355" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
    <style>@keyframes numGlow{0%,100%{opacity:0}50%{opacity:0.3}}</style>
    <rect x="30" y="100" width="160" height="80" rx="6" fill="rgba(231,76,111,0.1)" style="animation:numGlow 2s 0s infinite;"/>
    <rect x="205" y="100" width="160" height="80" rx="6" fill="rgba(102,187,106,0.1)" style="animation:numGlow 2s 0.7s infinite;"/>
    <rect x="380" y="100" width="160" height="80" rx="6" fill="rgba(255,167,38,0.1)" style="animation:numGlow 2s 1.4s infinite;"/>
  </svg>
</div>
