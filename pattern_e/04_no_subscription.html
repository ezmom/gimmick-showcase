<!-- E-04: ハイブリッド 定期縛りなし -->
<div style="width:570px;height:355px;position:relative;overflow:hidden;border-radius:12px;background:#fff;margin:0 auto;">
  <img src="../pattern_b/04_no_subscription.png" style="width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;">
  <svg viewBox="0 0 570 355" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
    <!-- チェックマーク（1回目） -->
    <circle cx="150" cy="200" r="22" fill="#22c55e" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <text x="150" y="207" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold" opacity="0">✓
      <animate attributeName="opacity" values="0;0;1;1" dur="4s" repeatCount="indefinite"/>
    </text>
    <!-- ×マーク（2回目） -->
    <text x="290" y="215" text-anchor="middle" fill="#e53935" font-size="72" font-weight="bold" opacity="0">✕
      <animate attributeName="opacity" values="0;0;0;0.9;0.9" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="0;0;0;1.3;1" dur="4s" repeatCount="indefinite" additive="sum"/>
    </text>
    <!-- ×マーク（3回目） -->
    <text x="430" y="215" text-anchor="middle" fill="#e53935" font-size="72" font-weight="bold" opacity="0">✕
      <animate attributeName="opacity" values="0;0;0;0;0.9" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="0;0;0;0;1" dur="4s" repeatCount="indefinite" additive="sum"/>
    </text>
  </svg>
</div>
