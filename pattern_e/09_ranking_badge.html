<!-- E-09_ranking_badge: Hybrid (Gemini image + CSS animation) -->
<div style="width:570px;height:355px;position:relative;overflow:hidden;border-radius:12px;background:#fff;margin:0 auto;">
  <img src="../pattern_b/09_ranking_badge.png" style="width:100%;height:100%;object-fit:contain;position:absolute;inset:0;">
  <svg viewBox="0 0 570 355" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
    <style>@keyframes shine{0%{x:-100}100%{x:670}}</style>
    <defs><linearGradient id="sh" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="rgba(255,255,255,0)"/><stop offset=".5" stop-color="rgba(255,255,255,0.4)"/><stop offset="1" stop-color="rgba(255,255,255,0)"/></linearGradient></defs>
    <rect y="0" width="80" height="355" fill="url(#sh)" style="animation:shine 3s linear infinite;"/>
    <style>@keyframes sp4{0%,100%{transform:scale(0);opacity:0}50%{transform:scale(1);opacity:1}}</style>
    <circle cx="180" cy="80" r="4" fill="#ffd700" style="animation:sp4 1.5s 0s infinite;"/>
    <circle cx="390" cy="90" r="3" fill="#ffd700" style="animation:sp4 1.5s 0.3s infinite;"/>
    <circle cx="200" cy="270" r="4" fill="#ffd700" style="animation:sp4 1.5s 0.6s infinite;"/>
    <circle cx="370" cy="260" r="3" fill="#ffd700" style="animation:sp4 1.5s 0.9s infinite;"/>
  </svg>
</div>
