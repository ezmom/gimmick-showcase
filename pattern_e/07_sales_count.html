<!-- E-07_sales_count: Hybrid (Gemini image + CSS animation) -->
<div style="width:570px;height:355px;position:relative;overflow:hidden;border-radius:12px;background:#fff;margin:0 auto;">
  <img src="../pattern_b/07_sales_count.png" style="width:100%;height:100%;object-fit:contain;position:absolute;inset:0;">
  <svg viewBox="0 0 570 355" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
    <style>@keyframes confetti{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(360px) rotate(720deg);opacity:0}}</style>
    <rect x="50" y="50" width="8" height="8" fill="#ffd700" rx="1" style="animation:confetti 3s 0s linear infinite;"/>
    <rect x="150" y="30" width="6" height="6" fill="#ff69b4" rx="1" style="animation:confetti 3.5s 0.3s linear infinite;"/>
    <rect x="280" y="40" width="7" height="7" fill="#4fc3f7" rx="1" style="animation:confetti 2.8s 0.6s linear infinite;"/>
    <rect x="400" y="35" width="8" height="8" fill="#66bb6a" rx="1" style="animation:confetti 3.2s 0.2s linear infinite;"/>
    <rect x="500" y="45" width="6" height="6" fill="#ffd700" rx="1" style="animation:confetti 3s 0.8s linear infinite;"/>
    <rect x="100" y="20" width="5" height="5" fill="#e74c6f" rx="1" style="animation:confetti 3.3s 1s linear infinite;"/>
    <rect x="350" y="25" width="7" height="7" fill="#ab47bc" rx="1" style="animation:confetti 2.9s 0.5s linear infinite;"/>
    <rect x="450" y="30" width="6" height="6" fill="#ff9800" rx="1" style="animation:confetti 3.1s 0.7s linear infinite;"/>
  </svg>
</div>
