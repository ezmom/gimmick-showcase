<!-- E-08_satisfaction_pie: Hybrid (Gemini image + CSS animation) -->
<div style="width:570px;height:355px;position:relative;overflow:hidden;border-radius:12px;background:#fff;margin:0 auto;">
  <img src="../pattern_b/08_satisfaction_pie.png" style="width:100%;height:100%;object-fit:contain;position:absolute;inset:0;">
  <svg viewBox="0 0 570 355" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
    <circle cx="285" cy="175" r="90" fill="none" stroke="rgba(231,76,111,0.2)" stroke-width="3">
      <animate attributeName="r" values="80;100;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <style>@keyframes sp3{0%,100%{r:0;opacity:0}50%{r:5;opacity:1}}</style>
    <circle cx="200" cy="100" fill="#e74c6f" style="animation:sp3 2s 0s infinite;"/>
    <circle cx="370" cy="110" fill="#e74c6f" style="animation:sp3 2s 0.4s infinite;"/>
    <circle cx="190" cy="250" fill="#e74c6f" style="animation:sp3 2s 0.8s infinite;"/>
    <circle cx="380" cy="240" fill="#e74c6f" style="animation:sp3 2s 1.2s infinite;"/>
  </svg>
</div>
