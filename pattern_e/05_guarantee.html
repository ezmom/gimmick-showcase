<!-- E-05: ハイブリッド 返金保証バッジ -->
<div style="width:570px;height:355px;position:relative;overflow:hidden;border-radius:12px;background:#fff;margin:0 auto;">
  <img src="../pattern_b/05_guarantee.png" style="width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;">
  <svg viewBox="0 0 570 355" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
    <style>
      @keyframes sp2 { 0%,100% { r:0; opacity:0; } 50% { r:6; opacity:1; } }
      @keyframes ringPulse { 0%,100% { r:80; opacity:0.3; } 50% { r:100; opacity:0; } }
      @keyframes badgeGlow { 0%,100% { opacity:0; } 50% { opacity:0.4; } }
    </style>
    <!-- パルスリング -->
    <circle cx="285" cy="170" fill="none" stroke="#f59e0b" stroke-width="2" style="animation:ringPulse 2s ease-out infinite;"/>
    <circle cx="285" cy="170" fill="none" stroke="#f59e0b" stroke-width="1.5" style="animation:ringPulse 2s 0.5s ease-out infinite;"/>
    <circle cx="285" cy="170" fill="none" stroke="#f59e0b" stroke-width="1" style="animation:ringPulse 2s 1s ease-out infinite;"/>
    <!-- スパークル -->
    <circle cx="200" cy="90" fill="#f59e0b" style="animation:sp2 1.8s 0s infinite;"/>
    <circle cx="370" cy="95" fill="#f59e0b" style="animation:sp2 1.8s 0.3s infinite;"/>
    <circle cx="190" cy="230" fill="#f59e0b" style="animation:sp2 1.8s 0.6s infinite;"/>
    <circle cx="380" cy="240" fill="#f59e0b" style="animation:sp2 1.8s 0.9s infinite;"/>
    <circle cx="230" cy="140" fill="#f59e0b" style="animation:sp2 1.8s 1.2s infinite;"/>
    <circle cx="340" cy="145" fill="#f59e0b" style="animation:sp2 1.8s 1.5s infinite;"/>
    <circle cx="250" cy="60" fill="#fbbf24" style="animation:sp2 2s 0.2s infinite;"/>
    <circle cx="330" cy="280" fill="#fbbf24" style="animation:sp2 2s 0.7s infinite;"/>
    <!-- グロー -->
    <circle cx="285" cy="170" r="70" fill="rgba(245,158,11,0.15)" style="animation:badgeGlow 3s ease-in-out infinite;"/>
  </svg>
</div>
